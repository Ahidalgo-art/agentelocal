name: Backend CI

on:
  pull_request:
    branches: [main, dev, test]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'
  push:
    branches: [main, dev, test]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'

jobs:
  quality-security-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agente_local_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d agente_local_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: src
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/agente_local_ci
      ALEMBIC_VERSION_TABLE: app_alembic_version_ci
      APP_MODULE: agente_local.main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Lint
        run: ruff check src tests

      - name: Migrations
        run: alembic upgrade head

      - name: Tests
        run: pytest -q

      - name: Security scan
        run: pip-audit -r requirements-security.txt

      - name: Architecture contracts
        run: lint-imports

      - name: Smoke app import
        run: |
          python -c "import os, importlib; m=os.environ.get('APP_MODULE','agente_local.main'); importlib.import_module(m); print('smoke_import_ok', m)"